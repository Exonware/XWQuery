# Source size (src/*): ~1.53 MB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwquery"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwquery - provides 'import xwquery' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "query",
    "sql",
    "graphql",
    "cypher",
    "sparql",
    "data",
    "conversion",
    "exonware",
]
classifiers = []
dependencies = [
    "exonware-xwquery",
]
authors = [
    { name = "eXonware Backend Team", email = "connect@exonware.com" },
]

[project.license]
text = "MIT"

[project.optional-dependencies]
dev = [
    "exonware-xwquery[dev]",
]
lazy = [
    "exonware-xwquery[lazy]",
]
full = [
    "exonware-xwquery[full]",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwquery"
Documentation = "https://github.com/exonware/xwquery#readme"
Subtree = "https://github.com/exonware/xwquery.git"

[tool.black]
line-length = 88
target-version = [
    "py38",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.hatch.version]
path = "src/exonware/xwquery/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwquery_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = []
