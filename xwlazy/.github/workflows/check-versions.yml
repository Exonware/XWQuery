name: Check for Hardcoded Versions

on:
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'docs/**/*.md'
      - '*.md'
      - '*.txt'
      - 'pyproject.toml'
      - '.pre-commit-version-check.py'
  push:
    branches: [main, develop]

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Check for hardcoded versions
        run: |
          python .pre-commit-version-check.py
      
      - name: Verify version.py is the source of truth
        run: |
          python -c "
          import re
          with open('pyproject.toml') as f: t = f.read()
          m = re.search(r'\[tool\.hatch\.version\][^\n]*\n\s*path\s*=\s*[\"']([^\"']+)[\"']', t, re.DOTALL)
          if not m:
              m = re.search(r'version\s*=\s*\{\s*file\s*=\s*[\"']([^\"']+)[\"']', t, re.DOTALL)
          if m:
              with open(m.group(1).strip()) as f: exec(f.read())
              print('Current version:', __version__)
          else:
              exit(2)
          "

