name: Check for Hardcoded Versions

on:
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'docs/**/*.md'
      - '*.md'
      - '*.txt'
      - 'pyproject.toml'
      - '.pre-commit-version-check.py'
  push:
    branches: [main, develop]

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Check for hardcoded versions
        run: |
          python .pre-commit-version-check.py
      
      - name: Verify version.py is the source of truth
        run: |
          python -c "
          import re
          from pathlib import Path
          pyproject = Path('pyproject.toml').read_text()
          m = re.search(r'\[tool\.hatch\.version\][^\n]*\n\s*path\s*=\s*[\"']([^\"']+)[\"']', pyproject, re.DOTALL)
          if not m:
              m = re.search(r'version\s*=\s*\{\s*file\s*=\s*[\"']([^\"']+)[\"']', pyproject, re.DOTALL)
          if not m:
              print('ERROR: No [tool.hatch.version] path in pyproject.toml')
              exit(2)
          path = Path(m.group(1).strip())
          if not path.exists():
              print('ERROR: version file not found:', path)
              exit(2)
          text = path.read_text()
          ver = re.search(r'__version__\s*=\s*[\"']([^\"']+)[\"']', text)
          if not ver:
              print('ERROR: __version__ not found in', path)
              exit(2)
          print('Current version:', ver.group(1))
          "

