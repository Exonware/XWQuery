name: Dual PyPI Publish - exonware-xwlazy & xwlazy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Resolve and validate version (tag must match version.py)
      id: version
      run: |
        set -e
        VERSION_FILE="src/exonware/xwlazy/version.py"
        FILE_VER=$(python -c "
        import re
        from pathlib import Path
        text = Path('$VERSION_FILE').read_text()
        m = re.search(r'__version__\s*=\s*[\"']([^\"']+)[\"']', text)
        print(m.group(1) if m else '')
        ")
        if [ -z "$FILE_VER" ]; then
          echo "ERROR: Could not read __version__ from $VERSION_FILE"
          exit 1
        fi
        echo "version=$FILE_VER" >> $GITHUB_OUTPUT
        if [ "${{ github.ref_type }}" = "tag" ]; then
          TAG_VER="${{ github.ref_name }}"
          TAG_VER="${TAG_VER#v}"
          echo "Comparing: tag_version=${TAG_VER} | version.py=${FILE_VER}"
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo ""
            echo "ERROR: Version mismatch (tag must match version.py)."
            echo "  tag_version (from ref): ${TAG_VER}"
            echo "  version.py (from file): ${FILE_VER}"
            echo "  Either push tag v${FILE_VER} or set __version__ = \"${TAG_VER}\" in $VERSION_FILE."
            exit 1
          fi
          echo "OK: tag and version.py match: ${FILE_VER}"
        else
          echo "Version in $VERSION_FILE: $FILE_VER (no tag to compare)"
        fi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Set release date to today
      run: |
        python -c "
        import re
        from pathlib import Path
        from datetime import date
        pyproject_path = Path('pyproject.toml')
        if not pyproject_path.exists():
            print('No pyproject.toml; skipping __date__ update')
            exit(0)
        pyproject = pyproject_path.read_text()
        m = re.search(r'\[tool\.hatch\.version\][^\n]*\n\s*path\s*=\s*[\"']([^\"']+)[\"']', pyproject, re.DOTALL)
        if not m:
            print('No [tool.hatch.version] path; skipping __date__ update')
            exit(0)
        p = Path(m.group(1).strip())
        if not p.exists():
            print('Version file not found:', p, '; skipping __date__ update')
            exit(0)
        text = p.read_text()
        literal_match = re.search(r'__date__\s*=\s*[\"\'][^\"\']*[\"\']', text)
        if not literal_match:
            print('__date__ is dynamic or missing; no update needed')
            exit(0)
        today = date.today().isoformat()
        new_text = re.sub(r'(__date__\s*=\s*)[\"\'][^\"\']*[\"\']', r'\1\"' + today + '\"', text)
        p.write_text(new_text)
        print('Set __date__ to', today, 'in', p)
        "

    - name: Build exonware-xwlazy package
      run: |
        echo "Building exonware-xwlazy package..."
        python -m build

    - name: Build xwlazy wrapper package
      run: |
        echo "Building xwlazy wrapper package..."
        cp pyproject.toml pyproject.backup.toml
        cp pyproject.xwlazy.toml pyproject.toml
        python -m build --wheel
        mv pyproject.backup.toml pyproject.toml

    - name: List built packages
      run: |
        echo "Built packages:"
        find dist -name "*.whl" -o -name "*.tar.gz" | sort

    - name: Publish exonware-xwlazy to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "Publishing exonware-xwlazy to PyPI..."
        ls -la dist/
        twine upload --skip-existing dist/exonware_xwlazy-*.whl dist/exonware_xwlazy-*.tar.gz

    - name: Publish xwlazy wrapper to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "Publishing xwlazy wrapper to PyPI..."
        twine upload --skip-existing dist/xwlazy-*.whl

    - name: Success notification
      run: |
        echo "✅ Successfully published both packages:"
        echo "   📦 exonware-xwlazy v${{ github.ref_name }} (full package)"
        echo "   📦 xwlazy v${{ github.ref_name }} (wrapper)"
        echo ""
        echo "PyPI URLs:"
        echo "   https://pypi.org/project/exonware-xwlazy/"
        echo "   https://pypi.org/project/xwlazy/"
        echo ""
        echo "Install with either:"
        echo "   pip install xwlazy  # Wrapper"
        echo "   pip install exonware-xwlazy  # Direct"
        echo ""
        echo "Both import paths work:"
        echo "   import xwlazy"
        echo "   import exonware.xwlazy"

