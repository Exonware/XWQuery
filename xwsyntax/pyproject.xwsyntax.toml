# Source size (src/*): ~709.9 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwsyntax"
version = "0.6.0.1"
description = "Convenience wrapper for exonware-xwsyntax - provides 'import xwsyntax' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = []
classifiers = []
dependencies = [
    "exonware-xwsyntax",
]
authors = [
    { name = "eXonware Backend Team", email = "connect@exonware.com" },
]

[project.license]
text = "MIT"

[project.optional-dependencies]
dev = [
    "exonware-xwsyntax[dev]",
]
lazy = [
    "exonware-xwsyntax[lazy]",
]
full = [
    "exonware-xwsyntax[full]",
]

[project.urls]
Homepage = "https://exonware.com"
Repository = "https://github.com/exonware/xwsyntax"
Documentation = "https://github.com/exonware/xwsyntax#readme"

[tool.hatch.version]
path = "src/exonware/xwsyntax/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwsyntax_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = []
